<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Periodic Table | Chemistry Project</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1 fs-2 fw-bold text-light">
          🧪 Interactive Periodic Table
        </span>

        <form class="d-flex" onsubmit="return false;">
          <input
            class="form-control me-2"
            type="search"
            id="searchInput"
            placeholder="Search element (e.g. Au, Iron)..."
            aria-label="Search"
          />
        </form>
      </div>
    </nav>
    <div class="container mb-4 text-center" id="filter-buttons">
      <button class="btn btn-outline-dark btn-sm m-1 fw-bold" data-filter="all">
        All Elements
      </button>
      <button
        class="btn btn-outline-danger btn-sm m-1"
        data-filter="alkali-metal"
      >
        Alkali Metals
      </button>
      <button
        class="btn btn-outline-warning btn-sm m-1"
        data-filter="transition-metal"
      >
        Transition Metals
      </button>
      <button class="btn btn-outline-info btn-sm m-1" data-filter="noble-gas">
        Noble Gases
      </button>
      <button
        class="btn btn-outline-success btn-sm m-1"
        data-filter="diatomic-nonmetal"
      >
        Non-metals
      </button>
      <button
        class="btn btn-outline-secondary btn-sm m-1"
        data-filter="metalloid"
      >
        Metalloids
      </button>
    </div>
    <div class="container mt-5">
      <header class="text-center mb-5">
        <h1>Interactive Periodic Table</h1>
        <p class="lead">
          A professional tool for chemistry students and teachers.
        </p>
      </header>

      <div id="periodic-table-container" class="row g-2"></div>
    </div>
    <!-- BOOTSTRAP MODAL -->
    <div
      class="modal fade"
      id="elementModal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Element Name</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center">
            <h1 id="modalSymbol" class="display-1 fw-bold">H</h1>
            <p id="modalCategory" class="badge bg-primary text-wrap mb-3">
              Category
            </p>
            <div class="row text-start mt-3">
              <div class="col-6">
                <strong>Atomic Number:</strong> <span id="modalNumber"></span>
              </div>
              <div class="col-6">
                <strong>Atomic Mass:</strong> <span id="modalMass"></span>
              </div>
              <div class="col-12 mt-2">
                <strong>Discovery:</strong> <span id="modalDiscovery"></span>
              </div>
              <div class="col-12 mt-2">
                <strong>Summary:</strong>
                <p id="modalSummary" class="small text-muted"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script src="./script.js"></script>
  </body>
</html>
